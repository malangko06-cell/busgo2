<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 지도 연동</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    #map {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- 네이버 지도 API 불러오기 -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=eb3pj5qpk6"></script>

  <script>
    const map = new naver.maps.Map('map', {
      center: new naver.maps.LatLng(37.6110, 126.9973),
      zoom: 15
    });
  </script>
</body>
</html>
