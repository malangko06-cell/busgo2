    }

    .route-button {
      border: 1px solid #d0d7de;

      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .route-button.active {

      background: #2db400;
      border-color: #2db400;
    }

    .place-list {
      position: absolute;
      top: 96px;
      left: 20px;
      z-index: 1000;
      min-width: 250px;
      max-width: min(420px, calc(100vw - 40px));
      max-height: min(560px, calc(100vh - 140px));
      background: rgba(255, 255, 255, 1);
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(17, 24, 39, 0.28);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.50);
      display: flex;
      flex-direction: column;
    }

    .place-list-title {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 800;
      color: #111827;
    }

    .place-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .place-toggle {
      position: absolute;
      top: 96px;
      right: 20px;
      z-index: 1000;
      border: 1px solid #d0d7de;
      background: #ffffff;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      color: #1f2937;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.50);
    }

    .place-toggle.active {
      background: #111827;
      border-color: #111827;
      color: #ffffff;
    }

    .place-list-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      min-height: 0;
    }

    .place-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 16px;
      font-weight: 700;
      color: #1f2937;
      cursor: pointer;
      padding-top: 2px;
      padding-left: 2px;
    }

    .place-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .place-name {
      line-height: 1.2;
    }

    .place-meta {
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      line-height: 1.2;
    }

    .place-swatch {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      flex: 0 0 auto;
      margin-top: 3px;
      margin-left: 1px;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.85), 0 0 0 1px rgba(0, 0, 0, 0.14);

    function buildPlaceMarkerIcon(place, emphasized = false) {
      const accentColor = place.meta && place.meta.includes("서점") ? "#8b5cf6" : place.color;

      if (place.name === "국민대학교") {
        const glow = emphasized
          ? `0 0 0 6px ${accentColor}22, 0 10px 20px rgba(15, 23, 42, 0.28)`
          : "0 6px 16px rgba(15, 23, 42, 0.24)";

        return {
          content: `
            <div style="position: relative; display: inline-block;">
              <div style="
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 6px 10px;
                border-radius: 999px;
                background: ${accentColor};
                color: #111827;
                font-size: 12px;
                font-weight: 800;
                white-space: nowrap;
                border: 1px solid #111827;
                box-shadow: ${glow};
              ">
                <span style="
                  width: 8px;
                  height: 8px;
                  border-radius: 999px;
                  background: #ef4444;
                  display: inline-block;
                  flex: 0 0 auto;
                "></span>
                국민대학교
              </div>
              <div style="
                position: absolute;
                left: 50%;
                bottom: -9px;
                width: 10px;
                height: 10px;
                background: ${accentColor};
                border-right: 1px solid #111827;
                border-bottom: 1px solid #111827;
                transform: translateX(-50%) rotate(45deg);
                box-shadow: 4px 4px 10px rgba(15, 23, 42, 0.12);
              "></div>
            </div>
          `,
          anchor: new naver.maps.Point(40, 26)
        };
      }

      const outerRadius = place.shape === "diamond" ? "6px" : "999px";
      const innerRadius = place.shape === "diamond" ? "4px" : "999px";
      const outerTransform = place.shape === "diamond" ? "rotate(45deg)" : "none";
      const innerTransform = place.shape === "diamond" ? "rotate(45deg)" : "none";
      const size = emphasized ? 28 : 20;
      const inset = emphasized ? 5 : 4;
      const glow = emphasized
        ? `0 0 0 6px ${accentColor}22, 0 10px 20px rgba(15, 23, 42, 0.28)`
        : "0 6px 16px rgba(15, 23, 42, 0.24)";

      return {
        content: `
          <div style="
            width: ${size}px;
            height: ${size}px;
            border-radius: ${outerRadius};
            background: linear-gradient(135deg, ${accentColor}, #ffffff);
            border: 2px solid #ffffff;
            box-shadow: ${glow};
            position: relative;
            transform: ${outerTransform};
          ">
            <div style="
              position: absolute;
              inset: ${inset}px;
              border-radius: ${innerRadius};
              background: ${accentColor};
              transform: ${innerTransform};
            "></div>
          </div>
        `,
        anchor: new naver.maps.Point(size / 2, size / 2)
      };
    }

    function loadCSV(filePath) {
      return new Promise((resolve, reject) => {
        Papa.parse(filePath, {
          download: true,
          header: true,
          complete: (results) => resolve(results.data),
          error: (error) => reject(error)
        });
      });
    }

    function loadRouteData() {
      if (!csvDataPromise) {
        csvDataPromise = Promise.all([
          loadCSV("TBIS_MS_STTN.csv"),
          loadCSV("TBIS_MS_ROUTE_NODE.csv")
        ]);
      }

      return csvDataPromise;
    }

    function renderButtons(activeRouteKey) {
      routeButtonsEl.innerHTML = "";

      const allButton = document.createElement("button");
      allButton.type = "button";
      allButton.textContent = "전체";
      allButton.className = "route-button";

      if (activeRouteKey === "ALL") {
        allButton.classList.add("active");
        allButton.style.backgroundColor = "#111827";
        allButton.style.borderColor = "#111827";
      }

      allButton.addEventListener("click", () => {
        handleRouteButtonClick("ALL");
      });

      routeButtonsEl.appendChild(allButton);

      ROUTES.forEach(route => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = route.label;
        button.className = "route-button";

        if (route.key === activeRouteKey) {
          button.classList.add("active");
          button.style.backgroundColor = route.color;
          button.style.borderColor = route.color;
        }

        button.addEventListener("click", () => {
          handleRouteButtonClick(route.key);
        });

        routeButtonsEl.appendChild(button);
      });
    }

    function clearPolylines() {
      currentPolylines.forEach(polyline => {
        polyline.setMap(null);
      });

      currentPolylines = [];
    }

    function clearRouteDisplay() {
      clearPolylines();
      clearStopMarkers();
      clearDirectionMarkers();
    }

    function handleRouteButtonClick(routeKey) {
      if (activeRouteKey === routeKey) {
        activeRouteKey = null;
        clearRouteDisplay();
        renderButtons(null);
        return;
      }

      activeRouteKey = routeKey;
      drawRoute(routeKey);
    }

    function renderPlaceList(options = {}) {
      const previousItemsEl = placeListEl.querySelector(".place-list-items");
      const previousScrollTop = options.preserveScroll && previousItemsEl
        ? previousItemsEl.scrollTop
        : 0;
      const sortedPlaces = PLACES
        .filter(place => place.showInList)
        .sort((a, b) => b.position.lat - a.position.lat);

      placeListEl.innerHTML = `
        <div class="place-list-header">
          <div class="place-list-title">Art&Design 장소 리스트</div>
        </div>
        <div class="place-list-items">
          ${sortedPlaces.map(place => `
            <div class="place-item" data-place-name="${place.name}">
              <span
                class="place-swatch"
                style="background:${place.meta && place.meta.includes("서점") ? "#8b5cf6" : place.color};"
              ></span>
              <span class="place-text">
                <span class="place-name">${place.name}</span>
                ${place.meta && selectedPlaceName === place.name
                  ? `<span class="place-meta">${place.meta}</span>`
                  : ""}
              </span>
            </div>
          `).join("")}
        </div>
      `;

      placeListEl.querySelectorAll(".place-item").forEach(item => {
        item.addEventListener("click", () => {
          const placeName = item.dataset.placeName;
          selectedPlaceName = selectedPlaceName === placeName ? null : placeName;
          renderPlaceList({ preserveScroll: true });
          highlightPlaceMarker(placeName);
        });
      });

      if (options.preserveScroll) {
        const itemsEl = placeListEl.querySelector(".place-list-items");
        if (itemsEl) {
          itemsEl.scrollTop = previousScrollTop;
        }
      }
    }

    function renderPlaceToggle() {
      placeToggleEl.className = `place-toggle ${arePlaceMarkersVisible ? "active" : ""}`;
      placeToggleEl.textContent = arePlaceMarkersVisible ? "마커 숨기기" : "마커 보이기";
    }

    function renderPlaceMarkers() {
      placeMarkers.forEach(marker => {
        naver.maps.Event.clearInstanceListeners(marker);
        marker.setMap(null);
      });

      placeMarkers = PLACES.map(place => {
        const marker = new naver.maps.Marker({
          position: new naver.maps.LatLng(place.position.lat, place.position.lng),
          map: null,
          title: place.name,
          icon: buildPlaceMarkerIcon(place)
        });
        marker.__place = place;

        naver.maps.Event.addListener(marker, "mouseover", () => {
          if (place.name === "국민대학교") {
            return;
          }

          placeInfoWindow.setContent(`
            <div style="padding:8px 10px; font-size:13px; font-weight:700;">
              ${place.name}
            </div>
          `);
          placeInfoWindow.open(map, marker);
        });

        naver.maps.Event.addListener(marker, "mouseout", () => {
          placeInfoWindow.close();
        });

        return marker;
      });

      updatePlaceMarkerVisibility();
    }

    function clearPlaceClusterMarkers() {
      placeClusterMarkers.forEach(marker => {
        naver.maps.Event.clearInstanceListeners(marker);
        marker.setMap(null);
      });

      placeClusterMarkers = [];
    }

    function getPlaceClusterThreshold() {
      return 0.02 / Math.pow(2, Math.max(0, map.getZoom() - 11));
    }

    function buildPlaceClusters() {
      const threshold = getPlaceClusterThreshold();
      const thresholdSq = threshold * threshold;
      const clusterableMarkers = placeMarkers.filter(marker => marker.getTitle() !== "국민대학교");
      const clusters = [];

      clusterableMarkers.forEach(marker => {
        const position = marker.getPosition();
        const lat = position.y;
        const lng = position.x;
        const cluster = clusters.find(item => {
          const latDiff = item.lat - lat;
          const lngDiff = item.lng - lng;
          return (latDiff * latDiff) + (lngDiff * lngDiff) <= thresholdSq;
        });

        if (cluster) {
          cluster.markers.push(marker);
          cluster.lat = (cluster.lat * (cluster.markers.length - 1) + lat) / cluster.markers.length;
          cluster.lng = (cluster.lng * (cluster.markers.length - 1) + lng) / cluster.markers.length;
          return;
        }

        clusters.push({
          lat,
          lng,
          markers: [marker]
        });
      });

      return clusters;
    }

    function renderPlaceClusters() {
      clearPlaceClusterMarkers();

      buildPlaceClusters()
        .filter(cluster => cluster.markers.length > 1)
        .forEach(cluster => {
          const marker = new naver.maps.Marker({
            position: new naver.maps.LatLng(cluster.lat, cluster.lng),
            map: map,
            title: `장소 ${cluster.markers.length}개`,
            icon: {
              content: `
                <div style="
                  width: 34px;
                  height: 34px;
                  border-radius: 999px;
                  background: #4b5563;
                  color: #ffffff;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 13px;
                  font-weight: 800;
                  border: 2px solid #ffffff;
                  box-shadow: 0 6px 16px rgba(15, 23, 42, 0.24);
                ">
                  ${cluster.markers.length}
                </div>
              `,
              anchor: new naver.maps.Point(17, 17)
            }
          });

          naver.maps.Event.addListener(marker, "click", () => {
            map.setZoom(map.getZoom() + 1, false);
            map.panTo(marker.getPosition());
          });

          placeClusterMarkers.push(marker);
        });
    }

    function updatePlaceMarkerVisibility() {
      const shouldClusterPlaces = arePlaceMarkersVisible && map.getZoom() <= PLACE_CLUSTER_MAX_ZOOM;

      clearPlaceClusterMarkers();

      if (!arePlaceMarkersVisible) {
        placeMarkers.forEach(marker => {
          const isSchoolMarker = marker.getTitle() === "국민대학교";
          marker.setMap(isSchoolMarker ? map : null);
        });

        placeInfoWindow.close();
        return;
      }

      if (shouldClusterPlaces) {
        const clusteredMarkers = new Set();

        buildPlaceClusters().forEach(cluster => {
          if (cluster.markers.length > 1) {
            cluster.markers.forEach(marker => clusteredMarkers.add(marker));
          }
        });

        placeMarkers.forEach(marker => {
          const isSchoolMarker = marker.getTitle() === "국민대학교";
          marker.setMap(isSchoolMarker || !clusteredMarkers.has(marker) ? map : null);
        });

        renderPlaceClusters();
        placeInfoWindow.close();
        return;
      }

      placeMarkers.forEach(marker => {
        marker.setMap(map);
      });
    }

    function togglePlaceMarkers() {
      arePlaceMarkersVisible = !arePlaceMarkersVisible;
      updatePlaceMarkerVisibility();
      renderPlaceToggle();
    }

    function highlightPlaceMarker(placeName) {
      const placeMarker = placeMarkers.find(marker => marker.getTitle() === placeName);
      const place = PLACES.find(item => item.name === placeName);
      if (!placeMarker || !place) return;

      if (highlightedPlaceTimeout) {
        clearTimeout(highlightedPlaceTimeout);
      }

      placeMarkers.forEach(marker => {
        const markerPlace = PLACES.find(item => item.name === marker.getTitle());
        marker.setIcon(buildPlaceMarkerIcon(markerPlace));
      });

      if (!arePlaceMarkersVisible) {
        arePlaceMarkersVisible = true;
        updatePlaceMarkerVisibility();
        renderPlaceToggle();
      }

      if (place.name !== "국민대학교" && map.getZoom() <= PLACE_CLUSTER_MAX_ZOOM) {
        map.setZoom(PLACE_CLUSTER_MAX_ZOOM + 1, false);
      }

      placeMarker.setIcon(buildPlaceMarkerIcon(place, true));
      map.panTo(placeMarker.getPosition());
      placeInfoWindow.setContent(`
        <div style="padding:8px 10px; font-size:13px; font-weight:700;">
          ${place.name}
        </div>
      `);
      placeInfoWindow.open(map, placeMarker);

      highlightedPlaceTimeout = setTimeout(() => {
        placeMarker.setIcon(buildPlaceMarkerIcon(place));
      }, 1800);
    }

    function clearStopMarkers() {
      currentStopMarkers.forEach(marker => {
        naver.maps.Event.clearInstanceListeners(marker);
        marker.setMap(null);
      });

      currentStopMarkers = [];
      stopInfoWindow.close();
    }

    function clearDirectionMarkers() {
      currentDirectionMarkers.forEach(marker => {
        marker.setMap(null);
      });

      currentDirectionMarkers = [];
    }

    function updateStopMarkerVisibility() {
      const shouldShowStops = map.getZoom() >= STOP_MARKER_MIN_ZOOM;

      currentStopMarkers.forEach(marker => {
        marker.setMap(shouldShowStops ? map : null);
      });

      currentDirectionMarkers.forEach(marker => {
        marker.setMap(shouldShowStops ? map : null);
      });

      if (!shouldShowStops) {
        stopInfoWindow.close();
      }
    }

    function createStopMarkers(stops, routeColor) {
      clearStopMarkers();

      currentStopMarkers = stops.map(stop => {
        const isHighlightStop = HIGHLIGHT_STOP_NAMES.has(stop.name);
        const marker = new naver.maps.Marker({
          position: stop.position,
          map: null,
          title: stop.name,
          icon: {
            content: `
              <div style="
                width: ${isHighlightStop ? 16 : 10}px;
                height: ${isHighlightStop ? 16 : 10}px;
                border-radius: 999px;
                background: ${isHighlightStop ? "#f97316" : routeColor};
                border: ${isHighlightStop ? 3 : 2}px solid #ffffff;
                box-shadow: 0 0 0 ${isHighlightStop ? 2 : 1}px rgba(0, 0, 0, 0.18);
              "></div>
            `,
            anchor: new naver.maps.Point(
              isHighlightStop ? 8 : 5,
              isHighlightStop ? 8 : 5
            )
          }
        });

        naver.maps.Event.addListener(marker, "mouseover", () => {
          if (map.getZoom() < STOP_MARKER_MIN_ZOOM) {
            return;
          }

          stopInfoWindow.setContent(`
            <div style="padding:8px 10px; font-size:13px; font-weight:700;">
              ${stop.name}
            </div>
          `);
          stopInfoWindow.open(map, marker);
        });

        naver.maps.Event.addListener(marker, "mouseout", () => {
          stopInfoWindow.close();
        });

        return marker;
      });

      updateStopMarkerVisibility();
    }

    function createDirectionMarkers(path, routeColor) {
      clearDirectionMarkers();

      currentDirectionMarkers = path.slice(0, -1).map((point, index) => {
        const nextPoint = path[index + 1];
        const lat1 = point.y;
        const lng1 = point.x;
        const lat2 = nextPoint.y;
        const lng2 = nextPoint.x;
        const angle = Math.atan2(lat1 - lat2, lng2 - lng1) * 180 / Math.PI;
        const midPoint = new naver.maps.LatLng(
          (lat1 + lat2) / 2,
          (lng1 + lng2) / 2
        );

        return new naver.maps.Marker({
          position: midPoint,
          map: null,
          clickable: false,
          icon: {
            content: `
              <div style="
                color: ${routeColor};
                font-size: 16px;
                font-weight: 900;
                transform: translate(-50%, -50%) rotate(${angle}deg);
                text-shadow:
                  -1px -1px 0 #ffffff,
                  1px -1px 0 #ffffff,
                  -1px 1px 0 #ffffff,
                  1px 1px 0 #ffffff;
              ">▶</div>
            `,
            anchor: new naver.maps.Point(0, 0)
          }
        });
      });

      updateStopMarkerVisibility();
    }

    async function drawRoute(routeKey) {
      const route = routeMap.get(routeKey);
      const isAllRoutes = routeKey === "ALL";

      if (!isAllRoutes && !route) {
        alert("선택한 노선 정보를 찾지 못했어요.");
        return;
      }

      try {
        renderButtons(isAllRoutes ? "ALL" : route.key);

        const [stations, routeNodes] = await loadRouteData();

        const stationMap = new Map();
        stations.forEach(station => {
          stationMap.set(String(station.STTN_ID), station);
        });

        clearRouteDisplay();

        if (isAllRoutes) {
          let allRoutesBounds = null;

          ROUTES.forEach(currentRoute => {
            const path = routeNodes
              .filter(node => String(node.ROUTE_ID) === currentRoute.routeId)
              .sort((a, b) => Number(a.STTN_SN) - Number(b.STTN_SN))
              .map(node => {
                const station = stationMap.get(String(node.STTN_ID));
                if (!station) return null;

                const lng = parseFloat(station.CRDNT_X);
                const lat = parseFloat(station.CRDNT_Y);

                if (isNaN(lat) || isNaN(lng)) return null;

                return new naver.maps.LatLng(lat, lng);
              })
              .filter(Boolean);

            if (path.length > 0) {
              if (!allRoutesBounds) {
                allRoutesBounds = new naver.maps.LatLngBounds(path[0], path[0]);
              }

              path.forEach(point => {
                allRoutesBounds.extend(point);
              });

              const polyline = new naver.maps.Polyline({
                map: map,
                path: path,
                strokeColor: currentRoute.color,
                strokeWeight: 4,
                strokeOpacity: 1,
                clickable: true
              });

              naver.maps.Event.addListener(polyline, "click", () => {
                handleRouteButtonClick(currentRoute.key);
              });

              currentPolylines.push(polyline);
            }
          });

          if (!hasFittedInitialAllRoutes && allRoutesBounds) {
            map.fitBounds(allRoutesBounds, {
              top: 44,
              right: 44,
              bottom: 44,
              left: 44
            });
            map.setZoom(map.getZoom() + 1, false);
            hasFittedInitialAllRoutes = true;
          }

          return;
        }

        const filteredNodes = routeNodes
          .filter(node => String(node.ROUTE_ID) === route.routeId)
          .sort((a, b) => Number(a.STTN_SN) - Number(b.STTN_SN));

        const routeStops = filteredNodes
          .map(node => {
            const station = stationMap.get(String(node.STTN_ID));
            if (!station) return null;

            const lng = parseFloat(station.CRDNT_X);
            const lat = parseFloat(station.CRDNT_Y);

            if (isNaN(lat) || isNaN(lng)) return null;

            return {
              name: station.STTN_NM,
              position: new naver.maps.LatLng(lat, lng)
            };
          })
          .filter(Boolean);

        const path = routeStops.map(stop => stop.position);

        if (path.length === 0) {
          alert(`${route.label} 노선 좌표를 찾지 못했어요.`);
          return;
        }

        currentPolylines.push(new naver.maps.Polyline({
          map: map,
          path: path,
          strokeColor: route.color,
          strokeWeight: 5,
          strokeOpacity: 0.7
        }));

        createStopMarkers(routeStops, route.color);
        createDirectionMarkers(path, route.color);

      } catch (error) {
        console.error(error);
        alert(`${route.label} 노선도를 불러오는 중 오류가 났어요.`);
      }
    }

    naver.maps.Event.addListener(map, "zoom_changed", () => {
      updateStopMarkerVisibility();
      updatePlaceMarkerVisibility();
    });

    placeToggleEl.addEventListener("click", () => {
      togglePlaceMarkers();
    });

    renderPlaceList();
    renderPlaceToggle();
    renderPlaceMarkers();
    renderButtons(activeRouteKey);
    drawRoute(activeRouteKey);
  </script>
</body>
